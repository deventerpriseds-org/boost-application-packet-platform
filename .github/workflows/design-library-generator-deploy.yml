name: Deploy Design Library Generator

on:
  push:
    branches: [main, claude/figma-design-library-generator-esrbk9]
    paths:
      - 'design-library-generator/**'
      - '.github/workflows/design-library-generator-deploy.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: design-library-generator/package-lock.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # Resolve Entra registration for this app — created by azure-entra-app.yml
      # (or reuse executive-engine-web if running as the same SPA origin).
      # Gracefully empty → Microsoft button disabled if not yet provisioned.
      - name: Resolve Microsoft client ID
        id: msid
        run: |
          MSID=$(az ad app list --display-name design-library-generator --query "[0].appId" -o tsv 2>/dev/null || true)
          if [ -z "$MSID" ] || [ "$MSID" = "null" ]; then
            # Fall back to executive-engine-web (same Entra tenant, same SPA redirect base)
            MSID=$(az ad app list --display-name executive-engine-web --query "[0].appId" -o tsv 2>/dev/null || true)
          fi
          if [ "$MSID" = "null" ]; then MSID=""; fi
          echo "client_id=${MSID}" >> $GITHUB_OUTPUT

      # Provision the Static Web App if it doesn't exist yet
      - name: Ensure Static Web App exists
        id: swa
        run: |
          EXISTS=$(az staticwebapp show \
            --name design-library-generator \
            --resource-group EnterpriseDS_ResourceGRP \
            --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating new Static Web App: design-library-generator"
            az staticwebapp create \
              --name design-library-generator \
              --resource-group EnterpriseDS_ResourceGRP \
              --location eastus2 \
              --sku Free \
              --login-with-github false
          else
            echo "Static Web App already exists: $EXISTS"
          fi
          HOST=$(az staticwebapp show \
            --name design-library-generator \
            --resource-group EnterpriseDS_ResourceGRP \
            --query "defaultHostname" -o tsv 2>/dev/null || echo "")
          echo "hostname=$HOST" >> $GITHUB_OUTPUT

      - name: Install and Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # Shared canonical Google redirect (auth broker) — registered once, used by all apps
          VITE_GOOGLE_REDIRECT_URI: https://proud-hill-09accd00f.7.azurestaticapps.net
          VITE_MS_CLIENT_ID: ${{ steps.msid.outputs.client_id }}
          VITE_MS_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          VITE_API_BASE: https://job-platform-api.azurewebsites.net/api
        run: |
          cd design-library-generator
          npm ci
          npm run build

      - name: Get Static Web App token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name design-library-generator \
            --resource-group EnterpriseDS_ResourceGRP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: design-library-generator/dist
          output_location: ""
          skip_app_build: true

      - name: Print app URL
        run: |
          echo "✓ Deployed: https://${{ steps.swa.outputs.hostname }}"
