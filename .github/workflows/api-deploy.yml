name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd api
          npm ci

      - name: Build TypeScript
        run: |
          cd api
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Create deployment zip
        run: |
          cd api
          zip -r ../api-deploy.zip . --exclude '*.ts' --exclude 'src/*'

      - name: Sync secrets to Function App settings
        run: |
          az functionapp config appsettings set \
            --name job-platform-api \
            --resource-group EnterpriseDS_ResourceGRP \
            --settings \
              "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
              "MICROSOFT_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
              "MICROSOFT_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
              "MICROSOFT_TENANT_ID=ee633423-c321-413c-a191-ace8b07e4196" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "AZURE_PG_HOST=eds-postgresql.postgres.database.azure.com" \
              "AZURE_PG_PORT=5432" \
              "AZURE_PG_DATABASE=RAG_AI_Agents" \
              "AZURE_PG_USER=Admin_eds" \
              "AZURE_PG_PASSWORD=${{ secrets.AZURE_PG_PASSWORD }}" \
              "NODE_ENV=production"

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --name job-platform-api \
            --resource-group EnterpriseDS_ResourceGRP \
            --src api-deploy.zip
