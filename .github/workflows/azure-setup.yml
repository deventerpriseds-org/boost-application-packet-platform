name: Azure Infrastructure Setup
# Run this manually once to bootstrap tables + Function App env vars.
# Requires: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID secrets.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Create storage tables
        run: |
          CONN="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          for table in AppConfig Prompts JobApplications MasterContext; do
            az storage table create --name $table --connection-string "$CONN" || true
          done

      - name: Set Function App environment variables
        run: |
          az functionapp config appsettings set \
            --name job-platform-api \
            --resource-group EnterpriseDS_ResourceGRP \
            --settings \
              "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "MICROSOFT_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
              "NODE_ENV=production"

      - name: Verify tables
        run: |
          az storage table list \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --query "[].name" -o tsv
