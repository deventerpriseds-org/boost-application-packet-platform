name: Register Executive Engine redirect URI on the mail Entra app

# REUSE the existing mail-and-appointments Entra sign-in app
# (enterpriseds-mail-web) for Executive Engine Microsoft sign-in — do NOT create
# a new app. This appends the Executive Engine Static Web App origin to that
# app's SPA redirect URIs so MSAL (redirectUri = window.location.origin) is
# accepted from this app too. Idempotent.
#
# Prereq (one-time, admin — graph.microsoft.com is blocked from CCR sessions, so
# run this from GitHub Actions or the portal): the deploy SP must hold Microsoft
# Graph Application.ReadWrite.All (admin-consented). Without it, the az rest
# steps fail with "Insufficient privileges".
#
# Alternative (no workflow): in the Entra portal, open app
# 'enterpriseds-mail-web' → Authentication → Single-page application → add the
# redirect URI printed below.

on:
  workflow_dispatch:

env:
  RESOURCE_GROUP: EnterpriseDS_ResourceGRP
  MAIL_APP_NAME: enterpriseds-mail-web
  EE_STATIC_WEB_APP: executive-engine-web

jobs:
  register-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Append Executive Engine origin to the mail app's SPA redirect URIs
        run: |
          set -euo pipefail
          HOST=$(az staticwebapp show --name "$EE_STATIC_WEB_APP" --resource-group "$RESOURCE_GROUP" --query "defaultHostname" -o tsv)
          REDIRECT="https://$HOST"
          echo "Executive Engine redirect URI: $REDIRECT"

          APP_ID=$(az ad app list --display-name "$MAIL_APP_NAME" --query "[0].appId" -o tsv)
          OBJ_ID=$(az ad app show --id "$APP_ID" --query id -o tsv)

          CURRENT=$(az rest --method GET --uri "https://graph.microsoft.com/v1.0/applications/$OBJ_ID?\$select=spa" | jq -c '.spa.redirectUris // []')
          NEXT=$(echo "$CURRENT" | jq -c --arg u "$REDIRECT" 'if index($u) then . else . + [$u] end')
          echo "redirect URIs: $CURRENT -> $NEXT"

          az rest --method PATCH \
            --uri "https://graph.microsoft.com/v1.0/applications/$OBJ_ID" \
            --headers 'Content-Type=application/json' \
            --body "{\"spa\":{\"redirectUris\":$NEXT}}"

          {
            echo "### Executive Engine sign-in wired to the mail Entra app"
            echo "- **Reused app:** $MAIL_APP_NAME (client ID \`$APP_ID\`)"
            echo "- **Added SPA redirect URI:** $REDIRECT"
            echo "- Next: re-run **Deploy Executive Engine** (it injects VITE_MS_CLIENT_ID from this app / MAIL_MS_CLIENT_ID)."
          } >> "$GITHUB_STEP_SUMMARY"
