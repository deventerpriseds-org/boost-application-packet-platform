name: Deploy Executive Engine to Azure Static Web Apps

on:
  push:
    branches: [main, claude/git-push-main-1zcqw5]
    paths:
      - 'app/**'
      - '.github/workflows/executive-engine-deploy.yml'
  workflow_dispatch:

# Both `main` and the feature branch trigger this workflow, and the session
# workflow pushes them ~1s apart (feature push, then ff-merge to main). Without
# serialization the two runs deploy identical content to the SAME Static Web App
# concurrently and one is rejected with "No matching Static Web App environment
# was found." A single-slot concurrency group (keyed only to the SWA, not the
# ref) makes the later push supersede the earlier in-progress one.
concurrency:
  group: executive-engine-web-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # Resolve THIS app's own Entra sign-in registration (executive-engine-web),
      # created by azure-entra-app.yml. The deploy SP already has the Graph grant,
      # so this resolves by name — no portal step. Empty until that workflow has
      # run → Microsoft button stays disabled (graceful).
      - name: Resolve Microsoft client ID
        id: msid
        run: |
          MSID=$(az ad app list --display-name executive-engine-web --query "[0].appId" -o tsv 2>/dev/null || true)
          if [ "$MSID" = "null" ]; then MSID=""; fi
          echo "client_id=${MSID}" >> $GITHUB_OUTPUT

      - name: Install and Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # Shared canonical Google redirect (enterpriseds-auth-broker) — same for
          # every app, registered once in the Google client. No per-app console step.
          VITE_GOOGLE_REDIRECT_URI: https://proud-hill-09accd00f.7.azurestaticapps.net
          VITE_MS_CLIENT_ID: ${{ steps.msid.outputs.client_id }}
          VITE_MS_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          VITE_API_BASE_URL: https://job-platform-api.azurewebsites.net/api
        run: |
          cd app
          npm ci
          npm run build

      - name: Get Static Web App token
        id: swa_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name executive-engine-web \
            --resource-group EnterpriseDS_ResourceGRP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app/dist
          output_location: ""
          skip_app_build: true
