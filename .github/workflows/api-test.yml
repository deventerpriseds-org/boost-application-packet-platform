name: API Test

on:
  workflow_dispatch:
    inputs:
      method:
        description: 'HTTP method (GET, POST, PATCH, DELETE)'
        required: false
        default: 'GET'
      path:
        description: 'API path, e.g. /api/opp/uuid/enrich or /api/health'
        required: true
      body:
        description: 'JSON body (for POST/PATCH). Leave empty for GET.'
        required: false
        default: ''

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          API_METHOD: ${{ github.event.inputs.method }}
          API_PATH: ${{ github.event.inputs.path }}
          API_BODY: ${{ github.event.inputs.body }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.parse, hmac, hashlib, base64, time, re

          client_secret = os.environ['AZURE_CLIENT_SECRET']
          method = os.environ.get('API_METHOD', 'GET')
          path = os.environ['API_PATH']
          body = os.environ.get('API_BODY', '')

          # Mint a server-verified session token (same scheme as the API's signSession):
          # HMAC-SHA256 over base64url(header).base64url(payload) with the app's signing secret.
          # The Function signs with SESSION_SIGNING_SECRET || MICROSOFT_CLIENT_SECRET (== AZURE_CLIENT_SECRET,
          # which we have here), so this token verifies server-side and marks the request as an
          # authenticated owner — programmatic testing without an interactive OAuth sign-in. The owner
          # is taken from ?owner= in the path (default: the production owner).
          def b64url(b):
            if isinstance(b, str): b = b.encode()
            return base64.urlsafe_b64encode(b).decode().rstrip('=')
          m = re.search(r'[?&]owner=([^&]+)', path)
          owner = urllib.parse.unquote(m.group(1)) if m else 'von.ellis@enterpriseds.io'
          now = int(time.time())
          header = b64url(json.dumps({'alg': 'HS256', 'typ': 'JWT'}, separators=(',', ':')))
          payload = b64url(json.dumps({'email': owner, 'provider': 'api-test', 'iat': now, 'exp': now + 12 * 3600}, separators=(',', ':')))
          signing_input = f'{header}.{payload}'
          sig = b64url(hmac.new(client_secret.encode(), signing_input.encode(), hashlib.sha256).digest())
          token = f'{signing_input}.{sig}'
          print(f'Minted session token for owner={owner}')

          base = 'https://job-platform-api.azurewebsites.net'
          url = base + path
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          req_body = body.encode() if body else None
          req = urllib.request.Request(url, data=req_body, headers=headers, method=method)
          try:
            with urllib.request.urlopen(req) as resp:
              status = resp.status
              result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
            status = e.code
            try:
              result = json.loads(e.read())
            except Exception:
              result = {'http_error': str(e)}

          print(f'\nHTTP {status} {method} {url}')
          print(json.dumps(result, indent=2))
          if status >= 400:
            exit(1)
          PYEOF
